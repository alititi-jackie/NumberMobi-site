<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>美国手机靓号市场 | NumberMobi</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- Tabler UI 核心CDN -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f7fafe; }
    .card { transition: box-shadow 0.16s; cursor: pointer; }
    .card.sold { background: #ebedf0 !important; opacity: 0.62; pointer-events: none; }
    .badge-top {
      position: absolute; right: 1rem; top: 1rem; z-index: 2;
    }
    .number {
      color: #2065d1; font-size: 1.27rem; font-weight: bold;
      letter-spacing: 2px; margin-bottom: 0.3rem; line-height: 1.3;
    }
    .price { font-size: 1.12rem; color: #099a1f; font-weight: bold; }
    .search-input { width: 100%; max-width: 380px; margin: 0 auto 1.2rem; }
    @media (max-width: 575px) {
      .number { font-size: 1.1rem;}
      .price { font-size: 1rem;}
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="navbar navbar-expand-md navbar-light bg-white mb-3 shadow-sm">
    <div class="container-xl">
      <a href="/" class="navbar-brand">
        <span class="fw-bold text-primary">NumberMobi 靓号市场</span>
      </a>
      <div class="navbar-nav flex-row order-md-last">
        <a href="https://openaa.com" class="nav-link px-2">首页</a>
        <a href="#" class="nav-link px-2" onclick="alert('请按Ctrl+D收藏')">收藏</a>
      </div>
    </div>
  </header>

  <!-- 搜索栏 -->
  <div class="container-xl">
    <div class="row mb-2">
      <div class="col-12 text-center">
        <input class="form-control form-control-lg search-input" placeholder="搜索号码片段，如 917 或 6666" id="searchInput" autocomplete="off">
      </div>
    </div>
    <!-- 号码卡片网格 -->
    <div class="row" id="cardGrid"></div>
    <div class="row">
      <div class="col-12 text-center mt-3 mb-4 small text-muted">
        页面展示部分号码，更多靓号请联系我们
      </div>
    </div>
  </div>
  
  <!-- 联系弹窗 -->
  <div class="modal fade" id="contactModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">联系方式</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- 此处内容JS动态渲染 -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- Tabler JS（含弹窗等） -->
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
  <script>
    // 号码渲染逻辑
    let allNumbers = [];
    function renderCards(numbers) {
      const grid = document.getElementById('cardGrid');
      if (!numbers.length) {
        grid.innerHTML = '<div class="col-12 text-center text-muted py-5 fs-4">无相关号码</div>';
        return;
      }
      grid.innerHTML = numbers.map(item => {
        // 展示格式化号码
        let num = item.number;
        if (num.length === 10) num = `(${num.slice(0,3)}) ${num.slice(3,6)}-${num.slice(6)}`;
        // 热卖/已售tag
        let badge = '';
        if (item.hot)  badge = `<span class="badge badge-top bg-danger-lt text-danger">热卖</span>`;
        if (item.sold) badge = `<span class="badge badge-top bg-secondary-lt">已售</span>`;
        // 卡片
        return `
<div class="col-6 col-md-4 col-lg-3 mb-4">
  <div class="card position-relative h-100${item.sold ? ' sold':''}" onclick="showContact()">
    ${badge}
    <div class="card-body text-center d-flex flex-column justify-content-center align-items-center" style="min-height:122px;">
      <div class="number">${num}</div>
      <div class="price">${item.sold ? '已售出' : (typeof item.price==='number'?'$'+item.price:'咨询')}</div>
    </div>
  </div>
</div>`;
      }).join('');
    }

    // 搜索
    function doSearch(key) {
      key = key.replace(/[^\d]/g, '');
      if (!key) {
        renderCards(allNumbers);
        return;
      }
      renderCards(allNumbers.filter(it=>it.number.includes(key)));
    }
    
    // 联系方式弹窗
function showContact() {
  const modal = new tabler.Modal(document.getElementById('contactModal'));
  document.getElementById('contactModal').querySelector('.modal-title').innerHTML = "联系方式";
  document.getElementById('contactModal').querySelector('.modal-body').innerHTML = `
    <div class="mb-3">
      <b>电话：</b>
      <span class="text-primary ms-1" style="font-size:1.14em;">+1 (917) 842-6666</span>
      <a href="tel:+19178426666" class="btn btn-primary btn-sm ms-2">拨打</a>
    </div>
    <div class="mb-2">
      <b>微信：</b>
      <span id="wechatId">hola24</span>
      <button class="btn btn-success btn-sm ms-2" onclick="copyWeChat()">复制微信号</button>
      <div class="small text-muted mt-1">复制后请到微信粘贴添加好友</div>
    </div>
    <div class="mt-4 text-muted small">
      支持微信支付、Zelle。⏱ 号码库存变化较快，请联系确认该号码是否仍在售。
    </div>
  `;
  modal.show();
}

    // 复制微信
    function copyWeChat() {
      const w = 'hola24';
      if (navigator.clipboard) {
        navigator.clipboard.writeText(w);
        alert('微信号已复制: ' + w);
      } else {
        const t = document.createElement('textarea');
        t.value = w; document.body.appendChild(t); t.select();
        try {document.execCommand('copy'); alert('微信号已复制: '+w);} catch{}
        document.body.removeChild(t);
      }
    }

    // 初始化
    window.onload = function() {
      fetch('./data/numbers.json')
       .then(res=>res.json())
       .then(data=>{
          allNumbers = data;
          renderCards(allNumbers);
        });
      
      document.getElementById('searchInput').addEventListener('input', e=>{
        doSearch(e.target.value);
      });
    }
  </script>
  <!-- =================== 温馨提醒 & 说明区块  ===================== -->
<div class="container-xl">
  <div class="card mt-4 mb-2 shadow-none border-0" style="background:#fffbe6;">
    <div class="card-body small py-3">
      <div class="mb-2"><b>📢 温馨提醒</b><br>
        页面仅展示部分号码样例。<br>
        如需特定号码（生日号、连号、特殊区号等），请通过电话或微信联系我们获取实时库存。
      </div>
      <div class="mb-2"><b>💰 支付方式</b><br>
        支持微信（WeChat）与 Zelle，方便在美华人使用。
      </div>
      <div class="mb-2"><b>⏰ 托管费用说明</b><br>
        号码购买后请尽量在 20 天内转出。<br>
        超过 20 天未转出，将按每月 $3 收取托管费用。
      </div>
    </div>
  </div>
</div>

<!-- =================== 页脚 ===================== -->
<footer class="mt-4 py-3 text-center small text-muted" style="background:#f7fafe;">
  <div class="mb-1">
    © 2026 NumberMobi.com<br>
    Powered by <a href="https://openaa.com" target="_blank">OpenAA.com</a>
  </div>
  <div>
    NumberMobi 为 OpenAA 旗下品牌，专注美国手机靓号服务。
  </div>
</footer>
</body>
</html>
