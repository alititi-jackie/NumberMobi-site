<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumberMobi｜美国手机靓号网</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 顶部 -->
<header class="topbar">
  <div class="logo">
    NumberMobi <span>美国手机靓号网</span>
  </div>

  <a class="back" href="https://openaa.com" target="_blank">← OpenAA</a>
</header>

<!-- 搜索 -->
<div class="search">
  <input id="searchInput" placeholder="搜索号码（如 917 / 666 / 8888）">
</div>

<!-- 分类 -->
<div class="filters">
  <button onclick="filter('all')">全部</button>
  <button onclick="filter('triple')">三连号</button>
  <button onclick="filter('quad')">四连号</button>
  <button onclick="filter('hot')">热门</button>
</div>

<!-- 列表 -->
<div id="list" class="list"></div>

<!-- 弹窗 -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>📞 购买此号码</h3>

    <p id="m-number"></p>

    <hr>

    <p>📱 电话：+1 (917) 842-6666</p>
    <p>💬 微信：hola24</p>
    <p>📧 邮箱：323748@gmail.com</p>

    <hr>

    <p>⚠️ 请联系客服确认库存</p>

    <p>💰 支付方式：Zelle / 微信 / 支付宝</p>

    <button onclick="closeModal()">关闭</button>
  </div>
</div>

<!-- 底部导航 -->
<nav class="bottom">
  <a href="#">🏠 首页</a>
  <a href="#list">📊 分类</a>
  <a href="#" onclick="openContact()">💬 联系</a>
  <a href="#info">📋 声明</a>
</nav>

<!-- 说明 -->
<footer id="info" class="footer">
  <h4>温馨提示</h4>
  <p>仅展示部分靓号库存</p>

  <h4>支付方式</h4>
  <p>Zelle / 微信 / 支付宝</p>

  <h4>托管说明</h4>
  <p>20天内转出，超期$3/月</p>

  <p class="brand">
    © NumberMobi.com ｜ OpenAA旗下品牌
  </p>
</footer>

<script src="app.js"></script>

</body>
</html>
